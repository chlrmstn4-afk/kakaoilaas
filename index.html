- 메모 기능: 화주 직원 간 주문 특이사항 공유 (회원사에는 공유 안됨)
- 엑셀 다운로드: 최근 3개월 주문만 가능 (개인정보 보호)

## WM 입고 처리 (회원사)
- 입고 프로세스: 입고 예정 조회 > 입고 확정 > 적치 작업
- 입고 확정: 팔레트/박스/낱개 수량 입력 시 자동 환산 후 [확정] 버튼
- 적치: 적치 전략 또는 상품별 적치셀 조건에 따라 목적지 셀 자동 배정
- PDA 입고 확정: 입고번호/상품바코드 조회 후 수량 입력
- PDA 적치: 상품바코드 스캔 후 셀바코드 스캔으로 확정
- 교환/반품 입고: 반품 운송장 번호 또는 원주문번호 입력, 상품바코드 스캔으로 검수
- 과입고/이슈 발생 시: 입고 예정 메뉴 [이슈추가] 에서 이슈 유형+메모 등록 후 OM 전송
- 입고 마감: 수동(마감 버튼) 또는 자동(익일 0시 자동 처리)

## 꿀팁
- 자동 로그인: Chrome 비밀번호 저장 기능 활용
- 초대 멤버 권한 없음: ① 창고 미등록 시 창고 등록 후 재로그인 ② 매칭 > 계정관리 > 멤버 및 권한에서 권한 확인·수정
- 보안 오류 ("잘못된 경로로 접근"): https://kakaoilaas.com 으로 접속 (http 아닌 https)
- xlsx 업로드 오류: Windows 레지스트리에서 HKEY_CLASSES_ROOT의 .xlsx 값 수정 또는 Excel을 기본 프로그램으로 설정
- WM 디폴트 화주: 더보기 > 설정하기 > 화주 설정 > 기본설정으로 저장
- OM 상품 등록 참조: 기존 상품을 출고상품 조회/수정 화면에서 다운로드하여 참조
- 홍보배너 문의: laas_cs@kakaoenterprise.com (1:1 비율, 최소 1080x1080px, JPG/PNG, 검수 1~3영업일)

## 주요 용어 (OM)
- SKU/출고상품: 재고 관리 최소 단위
- 가용재고: 안전재고를 차감한 고객 판매 가능 정상 수량
- 안전재고: 교환/반품 대응용 보관 수량
- 스타일코드: 대표 상품 부여 번호 (중복 등록 불가)
- 세트상품: 2종류 이상의 출고상품 연계 구조
- 사은품: 비용 없이 제공하는 출고상품
- 선출고: 교환 입고 도착 전 교환대상 상품 먼저 발송
- 부진재고: 입고 1달 경과 후 최근 7일간 미판매 상품
- 불량재고: 고객 출고 불가 상태의 상품
- 합포장: 2종류 이상의 출고상품을 한 박스로 포장
- CrossDock: 입고 직후 분류하여 즉시 출고, 보관 최소화
- 주문 마감 시간: 당일 출고 가능한 최종 주문 접수 시간
- 웨이브: 출고 작업 차수, 다중 주문 그룹화
- 박스입수량: 박스 한 개에 들어가는 낱개 상품 개수
- 팔레트입수량: 한 팔레트에 적재되는 박스 개수
- 유통가능일: 배송 및 소비 기간을 고려한 출고 기한
- 공급처: 화주가 출고상품을 공급받는 업체 (입고예정정보 등록 시 필수)

## 주요 용어 (WM)
- 로케이션: 물류센터 보관 공간 최소 단위 (앵글/팔레트 구분)
- 앵글: 선반 형태 보관 공간 (대형/중형/소형)
- 팔레트: 풀 팔레트(1.5m 이상)/하프 팔레트(0.7m 이하)
- 셀: 로케이션의 하위 보관 단위
- 존: 상위 보관 단위
- 랙: 재고 보관용 철골/선반 구조물
- 웨이브: 출고 작업 차수, 여러 주문 그룹화
- 피킹: 주문 수량만큼 상품 꺼내기
- 패킹: 포장 단위에 맞춰 상품 포장
- 적치: 제품을 정해진 로케이션에 보관
- 로트: 재고 관리 기준 단위 (속성 및 번호 부여)
- 가용수량: 재고에서 예약·보류 수량을 차감한 수량
- 과입고: 예정 물량보다 많은 실물 도착
- 누락재고: 전산보다 실물재고가 많은 경우
- 보충작업: 지속적 피킹을 위한 재고 보충
- 할당: 특정 출고 건에 특정 재고 배치
- WMS: Warehouse Management System (창고 관리 시스템)

  let SYSTEM_PROMPT = BASE_PROMPT;
  let messages = [];
  let isLoading = false;
  let selectedSystem = null;

  const SYSTEM_NAMES = {
    OM: 'OM (주문 관리)',
    WM: 'WM (창고 관리)',
    matching: '창고 매칭'
  };

  const QUICK_BUTTONS = {
    OM: [
      ['📦 상품 등록', '상품 등록 방법을 알려주세요'],
      ['🛒 쇼핑몰 연동', '쇼핑몰 연동 방법을 알려주세요'],
      ['📋 주문 관리', '주문 확인 및 처리 방법을 알려주세요'],
      ['🔄 반품/교환', '반품과 교환 처리 방법을 알려주세요'],
    ],
    WM: [
      ['📥 입고 처리', '입고 처리 방법을 알려주세요'],
      ['📊 재고 관리', '재고 관리 방법을 알려주세요'],
      ['⚡ 피킹/패킹', '피킹과 패킹 방법을 알려주세요'],
      ['📱 PDA 사용법', 'PDA를 이용한 작업 방법을 알려주세요'],
    ],
    matching: [
      ['🔍 창고 찾기', '창고를 찾는 방법을 알려주세요'],
      ['💰 스마트 견적', '스마트 견적 요청 방법을 알려주세요'],
      ['📝 가입 방법', '가입 절차를 알려주세요'],
      ['🔑 로그인 방법', '로그인 방법을 알려주세요'],
    ],
  };

  function now() {
    return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  function showInitialMessage() {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'systemSelectMsg';
    div.innerHTML =
      '<div class="avatar"><img src="상담사프로필.png" alt="상담사" /></div>' +
      '<div>' +
        '<div class="bubble">' +
          '안녕하세요! <strong>Kakao i LaaS</strong> 고객지원 AI입니다.<br/><br/>' +
          '어떤 서비스를 이용 중이신가요?' +
          '<div class="system-select-btns">' +
            '<button class="system-select-btn" onclick="selectSystem(\'OM\')">🛍️ OM<span>주문 관리</span></button>' +
            '<button class="system-select-btn" onclick="selectSystem(\'WM\')">🏘️ WM<span>창고 관리</span></button>' +
            '<button class="system-select-btn" onclick="selectSystem(\'matching\')">📦 창고 매칭<span>화주·회원사</span></button>' +
          '</div>' +
        '</div>' +
        '<div class="msg-time">' + now() + '</div>' +
      '</div>';
    chatArea.appendChild(div);
  }

  function selectSystem(system) {
    selectedSystem = system;
    const name = SYSTEM_NAMES[system];

    // 선택 버튼 → 선택 완료 배지로 교체
    const bubble = document.querySelector('#systemSelectMsg .bubble');
    bubble.innerHTML =
      '안녕하세요! <strong>Kakao i LaaS</strong> 고객지원 AI입니다.<br/><br/>' +
      '어떤 서비스를 이용 중이신가요?' +
      '<div class="selected-badge">✅ ' + name + ' 선택됨</div>';

    // 봇 응답 + 대화 컨텍스트 초기화
    const greeting = name + ' 서비스를 선택하셨군요!\n무엇이 궁금하신가요? 아래에서 선택하거나 직접 입력해 주세요.';
    addMessage('bot', greeting);
    messages.push({ role: 'user', parts: [{ text: '나는 ' + name + ' 서비스를 이용 중입니다.' }] });
    messages.push({ role: 'model', parts: [{ text: name + ' 관련 질문을 도와드리겠습니다!' }] });

    // 빠른 질문 버튼 업데이트
    const container = document.getElementById('quickBtns');
    container.innerHTML = '';
    (QUICK_BUTTONS[system] || []).forEach(function(item) {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = item[0];
      btn.onclick = function() { sendQuick(item[1]); };
      container.appendChild(btn);
    });

    // 입력창 활성화
    const input = document.getElementById('userInput');
    input.disabled = false;
    input.placeholder = '질문을 입력하세요... (Enter로 전송)';
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function addMessage(role, content) {
    const chatArea = document.getElementById('chatArea');
    const isUser = role === 'user';
    const div = document.createElement('div');
    div.className = 'msg ' + (isUser ? 'user' : 'bot');
    const formatted = content
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n/g, '<br/>');
    div.innerHTML =
      (!isUser ? '<div class="avatar"><img src="상담사프로필.png" alt="상담사" /></div>' : '') +
      '<div><div class="bubble">' + formatted + '</div><div class="msg-time">' + now() + '</div></div>' +
      (isUser ? '<div class="avatar" style="background:#ddd">&#x1F464;</div>' : '');
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typingIndicator';
    div.innerHTML = '<div class="avatar">&#x1F916;</div><div class="bubble typing"><span></span><span></span><span></span></div>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', text);
    messages.push({ role: 'user', parts: [{ text: text }] });
    showTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: MODEL,
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: messages,
          generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || 'HTTP ' + res.status);

      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '응답을 받지 못했습니다.';
      const replyWithLink = reply + '\n\n💬 자세한 상담을 원하시면 하단의 **채널톡 상담하기**를 눌러주세요.';
      removeTyping();
      addMessage('bot', replyWithLink);
      messages.push({ role: 'model', parts: [{ text: reply }] });

    } catch (err) {
      removeTyping();
      messages.pop();
      const chatArea = document.getElementById('chatArea');
      const errDiv = document.createElement('div');
      errDiv.className = 'msg bot';
      errDiv.innerHTML = '<div class="avatar">&#x1F916;</div><div><div class="error-msg">오류: ' + err.message + '</div><div class="msg-time">' + now() + '</div></div>';
      chatArea.appendChild(errDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }

  function sendQuick(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function loadSheetUpdates() {
    return new Promise(function(resolve) {
      const cbName = 'sheetCb_' + Date.now();
      const script = document.createElement('script');

      window[cbName] = function(data) {
        delete window[cbName];
        document.head.removeChild(script);
        try {
          const rows = data.table.rows;
          if (!rows || rows.length === 0) {
            console.warn('[시트] 시트에 내용이 없습니다.');
            return resolve('');
          }
          let extra = '';
          let loaded = 0;
          rows.forEach(function(row) {
            const section = row.c[0] && row.c[0].v ? String(row.c[0].v).trim() : '';
            const content = row.c[1] && row.c[1].v ? String(row.c[1].v).trim() : '';
            if (section && content) {
              extra += '\n## ' + section + '\n' + content + '\n';
              loaded++;
            }
          });
          console.log('[시트] 업데이트 ' + loaded + '개 항목 로드 완료 ✅');
          resolve(extra);
        } catch (e) {
          console.warn('[시트] 데이터 파싱 실패:', e.message);
          resolve('');
        }
      };

      script.onerror = function() {
        delete window[cbName];
        console.warn('[시트] 스크립트 로드 실패 - 시트가 공개 상태인지 확인하세요.');
        resolve('');
      };

      script.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
        '/gviz/tq?tqx=out:json;responseHandler:' + cbName;
      document.head.appendChild(script);
    });
  }

  async function init() {
    const updates = await loadSheetUpdates();
    if (updates.trim()) {
      SYSTEM_PROMPT = BASE_PROMPT + '\n\n## 추가 업데이트 내용 (최신 정보 우선 적용)\n' + updates;
    }
    showInitialMessage();
  }

  init();
</script>
