- 플랫폼별 제한사항: 카카오톡 선물하기(추가옵션 불가), 롯데ON(출고요청 상태에서만 취소 가능), Hmall(택배사·운송장 판매자센터에서 별도 처리)

## B2C 주문 관리 (OM - 화주)
- 쇼핑몰 연동 시 신규주문 자동 수집
- 정상 주문 흐름: 주문접수 > 할당 > 출고요청 > 배송준비중 > 출고작업중 > 배송중 > 배송완료
- 할당 모드: 자동(가용재고 기반) 또는 수동([할당] 버튼 직접 클릭)
- 출고 지시 자동화 ON/OFF 설정 가능
- 결품 처리: 배송 지연(발송 가능일+사유 입력) 또는 주문 취소
- 취소/반품/교환: 주문 상세에서 처리, 진행상태 '접수'일 때만 승인 버튼 활성화
- 선출고: 교환 입고 도착 전 교환상품 먼저 발송 (승인~반품완료 상태에서만 가능)
- 메모 기능: 화주 직원 간 주문 특이사항 공유 (회원사에는 공유 안됨)
- 엑셀 다운로드: 최근 3개월 주문만 가능 (개인정보 보호)

## WM 입고 처리 (회원사)
- 입고 프로세스: 입고 예정 조회 > 입고 확정 > 적치 작업
- 입고 확정: 팔레트/박스/낱개 수량 입력 시 자동 환산 후 [확정] 버튼
- 적치: 적치 전략 또는 상품별 적치셀 조건에 따라 목적지 셀 자동 배정
- PDA 입고 확정: 입고번호/상품바코드 조회 후 수량 입력
- PDA 적치: 상품바코드 스캔 후 셀바코드 스캔으로 확정
- 교환/반품 입고: 반품 운송장 번호 또는 원주문번호 입력, 상품바코드 스캔으로 검수
- 과입고/이슈 발생 시: 입고 예정 메뉴 [이슈추가] 에서 이슈 유형+메모 등록 후 OM 전송
- 입고 마감: 수동(마감 버튼) 또는 자동(익일 0시 자동 처리)

## 주요 용어 (OM)
- SKU/출고상품: 재고 관리 최소 단위
- 가용재고: 안전재고를 차감한 고객 판매 가능 정상 수량
- 안전재고: 교환/반품 대응용 보관 수량
- 스타일코드: 대표 상품 부여 번호 (중복 등록 불가)
- 세트상품: 2종류 이상의 출고상품 연계 구조
- 사은품: 비용 없이 제공하는 출고상품
- 선출고: 교환 입고 도착 전 교환대상 상품 먼저 발송
- 부진재고: 입고 1달 경과 후 최근 7일간 미판매 상품
- 불량재고: 고객 출고 불가 상태의 상품
- 합포장: 2종류 이상의 출고상품을 한 박스로 포장
- CrossDock: 입고 직후 분류하여 즉시 출고, 보관 최소화
- 주문 마감 시간: 당일 출고 가능한 최종 주문 접수 시간
- 웨이브: 출고 작업 차수, 다중 주문 그룹화
- 박스입수량: 박스 한 개에 들어가는 낱개 상품 개수
- 팔레트입수량: 한 팔레트에 적재되는 박스 개수
- 유통가능일: 배송 및 소비 기간을 고려한 출고 기한
- 공급처: 화주가 출고상품을 공급받는 업체 (입고예정정보 등록 시 필수)

## 주요 용어 (WM)
- 로케이션: 물류센터 보관 공간 최소 단위 (앵글/팔레트 구분)
- 앵글: 선반 형태 보관 공간 (대형/중형/소형)

- 존: 상위 보관 단위
- 랙: 재고 보관용 철골/선반 구조물
- 웨이브: 출고 작업 차수, 여러 주문 그룹화
- 피킹: 주문 수량만큼 상품 꺼내기
- 패킹: 포장 단위에 맞춰 상품 포장

- 할당: 특정 출고 건에 특정 재고 배치

          '<div class="system-select-btns">' +
            '<button class="system-select-btn" onclick="selectLspSystem(\'OM\')">🛍️ OM<span>화주사 주문 관리</span></button>' +
            '<button class="system-select-btn" onclick="selectLspSystem(\'WM\')">🏘️ WM<span>창고 관리 시스템</span></button>' +
          '</div>' +
        '</div>' +
        '<div class="msg-time">' + now() + '</div>' +
      '</div>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function selectLspSystem(system) {
    const bubble = document.querySelector('#lspSystemSelectMsg .bubble');
    bubble.innerHTML =
      '회원사는 어떤 시스템 셋업을 진행하실 건가요?' +
      '<div class="selected-badge">✅ ' + system + ' 선택됨</div>';

    onboardingType = '회원사-' + system;
    onboardingStepIndex = 0;
    showOnboardingStep(0);
  }

  function showOnboardingStep(idx) {
    onboardingStepIndex = idx;
    const steps = ONBOARDING_DATA[onboardingType];
    const step = steps[idx];

    // 이전 단계 강조 제거
    document.querySelectorAll('.bubble.onboarding-current').forEach(function(el) {
      el.classList.remove('onboarding-current');
    });

    step.msgs.forEach(function(msg) { addMessage('bot', msg); });

    // 방금 추가된 말풍선들만 노란 배경으로 강조
    var allBotBubbles = document.querySelectorAll('.msg.bot .bubble');
    var count = step.msgs.length;
    var start = Math.max(0, allBotBubbles.length - count);
    for (var i = start; i < allBotBubbles.length; i++) {
      allBotBubbles[i].classList.add('onboarding-current');
    }

    const container = document.getElementById('quickBtns');
    container.innerHTML = '';
    container.style.cssText = 'padding:8px 14px 10px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;';

    if (step.progress) {
      const curr = step.progress[0];
      const tot  = step.progress[1];
      const pct  = Math.round((curr / tot) * 100);
      const progDiv = document.createElement('div');
      progDiv.innerHTML =
        '<div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px;">' +
          '<span>온보딩 진행 중</span><span>' + curr + ' / ' + tot + ' 단계</span>' +
        '</div>' +
        '<div style="height:4px;background:#e0e0e0;border-radius:4px;overflow:hidden;">' +
          '<div style="height:100%;width:' + pct + '%;background:#4CAF50;border-radius:4px;transition:width 0.4s;"></div>' +
        '</div>';
      container.appendChild(progDiv);
    }

    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:8px;';

    step.btns.forEach(function(btn) {
      const el = document.createElement('button');
      el.textContent = btn.label;
      el.style.cssText = 'flex:1;padding:10px 14px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:inherit;';

      if (btn.action === 'no_match') {
        el.style.cssText += 'background:#f5f5f5;color:#555;border:1px solid #ddd;';
        el.onmouseover = function() { this.style.background = '#eeeeee'; };
        el.onmouseout  = function() { this.style.background = '#f5f5f5'; };
        el.onclick = function() { onboardingNoMatch(); };

      } else if (btn.action === 'next') {
        el.style.cssText += 'background:#4CAF50;color:#fff;';
        el.onmouseover = function() { this.style.background = '#43A047'; this.style.transform = 'translateY(-1px)'; };
        el.onmouseout  = function() { this.style.background = '#4CAF50'; this.style.transform = ''; };
        el.onclick = function() { showOnboardingStep(onboardingStepIndex + 1); };

      } else if (btn.action === 'go_chat') {
        el.style.cssText += 'background:#FEE500;color:#3C1E1E;';
        el.onmouseover = function() { this.style.background = '#f5d800'; };
        el.onmouseout  = function() { this.style.background = '#FEE500'; };
        el.onclick = function() { finishOnboarding(); };
      }

      btnRow.appendChild(el);
    });

    container.appendChild(btnRow);

    const chatArea = document.getElementById('chatArea');
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function onboardingNoMatch() {
    document.querySelectorAll('.bubble.onboarding-current').forEach(function(el) {
      el.classList.remove('onboarding-current');
    });
    addMessage('bot', '아직 창고 매칭이 되지 않으셨군요!\n먼저 창고 매칭을 완료해주세요.\n아래 **카카오 채널 상담하기** 버튼을 눌러 담당자와 직접 상담해 주세요. 😊');
    document.getElementById('quickBtns').innerHTML = '';
    document.getElementById('quickBtns').style.cssText = '';
  }

  function finishOnboarding() {
    isOnboarding = false;
    document.querySelectorAll('.bubble.onboarding-current').forEach(function(el) {
      el.classList.remove('onboarding-current');
    });

    // 입력창 복원
    document.querySelector('.input-area').style.display = '';
    const input = document.getElementById('userInput');
    input.disabled = false;
    input.placeholder = '질문을 입력하세요... (Enter로 전송)';
    document.getElementById('sendBtn').disabled = false;

    // 온보딩 유형에 따라 AI 상담 시스템 결정
    var system = (onboardingType === '회원사-WM') ? 'WM' : 'OM';
    selectedSystem = system;
    messages.push({ role: 'user',  parts: [{ text: '나는 ' + SYSTEM_NAMES[system] + ' 서비스를 이용 중입니다.' }] });
    messages.push({ role: 'model', parts: [{ text: SYSTEM_NAMES[system] + ' 관련 질문을 도와드리겠습니다!' }] });

    addMessage('bot', SYSTEM_NAMES[system] + ' AI 상담을 시작합니다!\n아래 빠른 버튼을 눌러보거나 직접 질문을 입력해주세요. 😊');

    const container = document.getElementById('quickBtns');
    container.innerHTML = '';
    container.style.cssText = '';
    (QUICK_BUTTONS[system] || []).forEach(function(item) {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = item[0];
      btn.onclick = function() { sendQuick(item[1]); };
      container.appendChild(btn);
    });

    input.focus();
  }

  function resetChat() {
    // 상태 초기화
    messages = [];
    selectedSystem = null;
    isLoading = false;
    isOnboarding = false;
    onboardingType = null;
    onboardingStepIndex = 0;

    // UI 초기화
    document.getElementById('chatArea').innerHTML = '';
    document.getElementById('quickBtns').innerHTML = '';
    document.getElementById('quickBtns').style.cssText = '';
    document.querySelector('.input-area').style.display = '';

    const input = document.getElementById('userInput');
    input.value = '';
    input.style.height = 'auto';
    input.disabled = true;
    input.placeholder = '서비스를 먼저 선택해 주세요.';
    document.getElementById('sendBtn').disabled = true;

    showInitialMessage();
  }

  // ===== 기존 채팅 함수 =====

  function addMessage(role, content) {
    const chatArea = document.getElementById('chatArea');
    const isUser = role === 'user';
    const div = document.createElement('div');
    div.className = 'msg ' + (isUser ? 'user' : 'bot');
    const formatted = content
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n/g, '<br/>');
    div.innerHTML =
      (!isUser ? '<div class="avatar"><img src="상담사프로필.png" alt="상담사" /></div>' : '') +
      '<div><div class="bubble">' + formatted + '</div><div class="msg-time">' + now() + '</div></div>' +
      (isUser ? '<div class="avatar" style="background:#ddd">&#x1F464;</div>' : '');
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typingIndicator';
    div.innerHTML = '<div class="avatar">&#x1F916;</div><div class="bubble typing"><span></span><span></span><span></span></div>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', text);
    messages.push({ role: 'user', parts: [{ text: text }] });
    showTyping();

    const MAX_RETRY = 2;
    let lastErr = null;

    for (var attempt = 0; attempt <= MAX_RETRY; attempt++) {
      try {
        if (attempt > 0) await new Promise(function(r) { setTimeout(r, 1500 * attempt); });

        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: MODEL,
            system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
            contents: messages,
            generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data?.error?.message || 'HTTP ' + res.status);

        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '응답을 받지 못했습니다.';
        const replyWithLink = reply + '\n\n💬 자세한 상담을 원하시면 하단의 **채널톡 상담하기**를 눌러주세요.';
        removeTyping();
        addMessage('bot', replyWithLink);
        messages.push({ role: 'model', parts: [{ text: reply }] });
        lastErr = null;
        break;

      } catch (err) {
        lastErr = err;
      }
    }

    if (lastErr) {
      removeTyping();
      messages.pop();
      const isOverload = lastErr.message && lastErr.message.toLowerCase().includes('demand');
      const errText = isOverload
        ? 'AI 서버가 일시적으로 혼잡합니다. 잠시 후 다시 시도해주세요. 🙏'
        : '오류: ' + lastErr.message;
      const chatArea = document.getElementById('chatArea');
      const errDiv = document.createElement('div');
      errDiv.className = 'msg bot';
      errDiv.innerHTML = '<div class="avatar">&#x1F916;</div><div><div class="error-msg">' + errText + '</div><div class="msg-time">' + now() + '</div></div>';
      chatArea.appendChild(errDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }

  function sendQuick(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function loadSheetUpdates() {
    return new Promise(function(resolve) {
      const cbName = 'sheetCb_' + Date.now();
      const script = document.createElement('script');

      window[cbName] = function(data) {
        delete window[cbName];
        document.head.removeChild(script);
        try {
          const rows = data.table.rows;
          if (!rows || rows.length === 0) {
            console.warn('[시트] 시트에 내용이 없습니다.');
            return resolve('');
          }
          let extra = '';
          let loaded = 0;
          rows.forEach(function(row) {
            const section = row.c[0] && row.c[0].v ? String(row.c[0].v).trim() : '';
            const content = row.c[1] && row.c[1].v ? String(row.c[1].v).trim() : '';
            if (section && content) {
              extra += '\n## ' + section + '\n' + content + '\n';
              loaded++;
            }
          });
          console.log('[시트] 업데이트 ' + loaded + '개 항목 로드 완료 ✅');
          resolve(extra);
        } catch (e) {
          console.warn('[시트] 데이터 파싱 실패:', e.message);
          resolve('');
        }
      };

      script.onerror = function() {
        delete window[cbName];
        console.warn('[시트] 스크립트 로드 실패 - 시트가 공개 상태인지 확인하세요.');
        resolve('');
      };

      script.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
        '/gviz/tq?tqx=out:json;responseHandler:' + cbName;
      document.head.appendChild(script);
    });
  }

  async function init() {
    const updates = await loadSheetUpdates();
    if (updates.trim()) {
      SYSTEM_PROMPT = BASE_PROMPT + '\n\n## ⚠️ 고객사 맞춤 FAQ [최우선 적용 필수]\n아래 질문과 동일하거나 유사한 질문이 들어오면, 위의 기존 내용을 무시하고 반드시 아래 답변만을 사용하여 답변하세요. 아래에 없는 내용은 기존 지식을 활용하세요.\n' + updates;
    }
    showInitialMessage();
  }

  init();
</script>
</body>
</html>
